<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haber Botu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700;8..60,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-mark">N°</span>
      <div>
        <h1>Haber Botu</h1>
        <p class="muted" id="last-updated">Yükleniyor…</p>
      </div>
    </div>
    <div class="actions">
      <button id="refresh" class="icon-btn" title="Yenile" aria-label="Yenile">↻</button>
      <button id="lock-btn" class="icon-btn" title="Çıkış" aria-label="Çıkış">🔒</button>
    </div>
  </header>

  <nav class="filter-bar">
    <div class="filter-bar-inner">
      <div class="filter-group">
        <span class="filter-label">HIZLI</span>
        <div class="chip-row" id="time-filters">
          <button class="chip" data-time="1">1 saat</button>
          <button class="chip" data-time="6">6 saat</button>
          <button class="chip active" data-time="24">24 saat</button>
          <button class="chip" data-time="168">7 gün</button>
          <button class="chip" data-time="720">30 gün</button>
          <button class="chip" data-time="0">Tümü</button>
        </div>
      </div>

      <div class="filter-group date-range">
        <span class="filter-label">ARALIK</span>
        <div class="date-inputs">
          <input id="date-from" type="datetime-local" />
          <span class="dash">—</span>
          <input id="date-to" type="datetime-local" />
          <button id="date-clear" class="link-btn" type="button">Temizle</button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">YÖN</span>
        <div class="chip-row" id="lean-filters">
          <button class="chip active" data-lean="all">Tümü</button>
          <button class="chip" data-lean="left"><span class="dot lean-left"></span>Sol</button>
          <button class="chip" data-lean="neutral"><span class="dot lean-neutral"></span>Nötr</button>
          <button class="chip" data-lean="right"><span class="dot lean-right"></span>Sağ</button>
        </div>
      </div>

      <div class="filter-group right">
        <span class="filter-label">SIRALAMA</span>
        <select id="sort-by" class="select-mini">
          <option value="recent">En yeni</option>
          <option value="coverage">Çok kaynak</option>
          <option value="score">Skor</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="container">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-head">
          <h2>Kaynaklar</h2>
          <span class="muted" id="source-count"></span>
        </div>
        <ul id="source-list" class="source-list"></ul>

        <details class="custom-feeds">
          <summary>+ Özel RSS ekle</summary>
          <form id="add-feed-form" class="add-feed-form">
            <input id="feed-url" type="url" placeholder="https://example.com/rss" autocomplete="off" required />
            <input id="feed-label" type="text" placeholder="Görünür ad" autocomplete="off" />
            <select id="feed-lean" class="select-mini">
              <option value="neutral">Nötr (default)</option>
              <option value="left">Sol</option>
              <option value="right">Sağ</option>
            </select>
            <button class="btn primary" type="submit">RSS Ekle</button>
            <p class="muted small">AI içeriğe göre lean'i override edebilir.</p>
          </form>
        </details>
      </section>

      <section class="panel stats-panel" id="stats-panel"></section>
    </aside>

    <section class="feed">
      <div class="feed-head">
        <h2 id="feed-title">Hikayeler</h2>
        <span class="muted" id="feed-count"></span>
      </div>
      <div id="story-container" class="stories"></div>
      <div id="load-more-wrap" class="load-more-wrap hidden">
        <button id="load-more" class="btn">Daha fazla göster</button>
      </div>
    </section>
  </main>

  <div id="password-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Yönetici Şifresi</h3>
      <p class="muted">Özel RSS eklemek/silmek için şifre gerekli.</p>
      <form id="password-form">
        <input id="password-input" type="password" placeholder="Şifre" autofocus />
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="cancel-password">İptal</button>
          <button type="submit" class="btn primary">Giriş</button>
        </div>
        <p id="password-error" class="error hidden">Şifre yanlış.</p>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
