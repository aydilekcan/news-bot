<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haber Botu Paneli</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">📰</span>
      <div>
        <h1>Haber Botu Paneli</h1>
        <p class="muted" id="last-updated">Yükleniyor...</p>
      </div>
    </div>
    <div class="actions">
      <button id="refresh" class="btn ghost" title="Yenile">↻ Yenile</button>
      <button id="lock-btn" class="btn ghost" title="Çıkış">🔒</button>
    </div>
  </header>

  <main class="container">
    <aside class="card sidebar">
      <div class="card-head">
        <h2>Kaynaklar</h2>
        <span class="muted" id="source-count"></span>
      </div>

      <div class="filter-row">
        <label class="filter-label">Siyasi yön</label>
        <div class="lean-filters">
          <button class="lean-chip active" data-lean="all">Tümü</button>
          <button class="lean-chip" data-lean="left"><span class="dot lean-left"></span> Sol</button>
          <button class="lean-chip" data-lean="neutral"><span class="dot lean-neutral"></span> Nötr</button>
          <button class="lean-chip" data-lean="right"><span class="dot lean-right"></span> Sağ</button>
        </div>
      </div>

      <ul id="source-list" class="source-list"></ul>

      <details class="custom-feeds">
        <summary>+ Özel RSS ekle</summary>
        <form id="add-feed-form" class="add-feed-form">
          <input id="feed-url" type="url" placeholder="https://example.com/rss" autocomplete="off" required />
          <input id="feed-label" type="text" placeholder="Görünür ad (örn. X Sitesi)" autocomplete="off" />
          <select id="feed-lean" class="select">
            <option value="neutral">Nötr (default)</option>
            <option value="left">Sol</option>
            <option value="right">Sağ</option>
          </select>
          <p class="muted small">AI, içeriğe göre lean'i override edebilir.</p>
          <button class="btn primary" type="submit">RSS Ekle</button>
        </form>
      </details>
    </aside>

    <section class="card">
      <div class="card-head">
        <h2 id="news-title">Haberler</h2>
        <span class="muted" id="news-count"></span>
      </div>
      <div id="news-container" class="news"></div>
    </section>
  </main>

  <div id="password-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Yönetici Şifresi</h3>
      <p class="muted">Özel RSS eklemek/silmek için şifre gerekli.</p>
      <form id="password-form">
        <input id="password-input" type="password" placeholder="Şifre" autofocus />
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="cancel-password">İptal</button>
          <button type="submit" class="btn primary">Giriş</button>
        </div>
        <p id="password-error" class="error hidden">Şifre yanlış.</p>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
