name: X Tweet Botu

on:
  schedule:
    - cron: '0 */2 * * *'  # Her 2 saatte bir
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: pip install requests

      - name: Botu çalıştır
        env:
          XQUIK_API_KEY: ${{ secrets.XQUIK_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          DISABLE_TELEGRAM: '1'  # '0' veya satırı sil → Telegram tekrar aktif
        run: python x_bot.py

      - name: State dosyasını kaydet
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add x_sent_ids.json x_bot.log tweets_data.json || true
          if ! git diff --staged --quiet; then
            git commit -m "x_bot state güncelle"
            # Dashboard üzerinden keywords.json değişmiş olabilir, çakışmayı engelle
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push denemesi $i başarısız, yeniden deniyorum..."
              sleep 3
            done
          fi
