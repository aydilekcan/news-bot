name: Haber Botu

on:
  schedule:
    - cron: '0 * * * *'  # Her saat başı (UTC). GitHub yoğunlukta birkaç dk gecikebilir.
  workflow_dispatch:  # Gerektiğinde manuel tetikleme

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: pip install feedparser requests

      - name: Botu çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_bot.py

      - name: State + haber verisini kaydet
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          [ -f sent_ids.json ] && git add sent_ids.json || true
          [ -f news_data.json ] && git add news_data.json || true
          git diff --staged --quiet || git commit -m "state + news_data güncelle"
          git pull --rebase || true
          git push
